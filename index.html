<!DOCTYPE html><html>
<head>
  <meta charset="UTF-8">
  <title>Attendance App</title>
</head>
<body>  <h1>Attendance App</h1>  <input type="text" id="name" placeholder="Enter your name">
  <button onclick="addName()">Submit</button>  <ul id="list"></ul>  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>  <script>
    const firebaseConfig = {
      apiKey: "Attendance-app-2026",
      authDomain: "Attendance-app-2026",
      databaseURL: "Attendance-app-2026",
      projectId: "Attendance-app-2026",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function addName() {
      const name = document.getElementById("name").value;
      if(name === "") return;

      db.ref("attendance").push({
        name: name
      });

      document.getElementById("name").value = "";
    }

    db.ref("attendance").on("value", (snapshot) => {
      const list = document.getElementById("list");
      list.innerHTML = "";

      snapshot.forEach((child) => {
        const li = document.createElement("li");
        li.innerText = child.val().name;
        list.appendChild(li);
      });
    });
  </script></body>
</html>
